<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" width="800" height="280">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1923"/>
      <stop offset="100%" stop-color="#1b2838"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="280" rx="12" fill="url(#bg)"/>
  
  <!-- Left box: Ubuntu PC -->
  <rect x="40" y="40" width="240" height="200" rx="8" fill="none" stroke="#0078D4" stroke-width="2" opacity="0.8"/>
  <text x="160" y="75" text-anchor="middle" fill="#0078D4" font-family="Segoe UI,sans-serif" font-size="16" font-weight="bold">🐧 Ubuntu PC</text>
  <line x1="60" y1="90" x2="260" y2="90" stroke="#0078D4" stroke-width="1" opacity="0.3"/>
  <text x="160" y="125" text-anchor="middle" fill="#8899aa" font-family="Segoe UI,sans-serif" font-size="14">Razer Mouse</text>
  <text x="160" y="155" text-anchor="middle" fill="#8899aa" font-family="Segoe UI,sans-serif" font-size="14">Wooting Keyboard</text>
  <text x="160" y="185" text-anchor="middle" fill="#8899aa" font-family="Segoe UI,sans-serif" font-size="14">Clipboard</text>
  
  <!-- Right box: Windows Laptop -->
  <rect x="520" y="40" width="240" height="200" rx="8" fill="none" stroke="#0078D4" stroke-width="2" opacity="0.8"/>
  <text x="640" y="75" text-anchor="middle" fill="#0078D4" font-family="Segoe UI,sans-serif" font-size="16" font-weight="bold">🪟 Windows Laptop</text>
  <line x1="540" y1="90" x2="740" y2="90" stroke="#0078D4" stroke-width="1" opacity="0.3"/>
  <text x="640" y="125" text-anchor="middle" fill="#8899aa" font-family="Segoe UI,sans-serif" font-size="14">Touchpad</text>
  <text x="640" y="155" text-anchor="middle" fill="#8899aa" font-family="Segoe UI,sans-serif" font-size="14">Keyboard</text>
  <text x="640" y="185" text-anchor="middle" fill="#8899aa" font-family="Segoe UI,sans-serif" font-size="14">Clipboard</text>
  
  <!-- Top arrow: Ubuntu → Windows -->
  <line x1="280" y1="110" x2="510" y2="110" stroke="#0078D4" stroke-width="2" filter="url(#glow)"/>
  <polygon points="510,104 525,110 510,116" fill="#0078D4" filter="url(#glow)"/>
  <text x="400" y="100" text-anchor="middle" fill="#5ba3d9" font-family="Segoe UI,sans-serif" font-size="11">🖱️ Mouse  ⌨️ Keyboard  📋 Clipboard</text>
  
  <!-- Bottom arrow: Windows → Ubuntu -->
  <line x1="520" y1="170" x2="290" y2="170" stroke="#00BCF2" stroke-width="2" filter="url(#glow)" opacity="0.7"/>
  <polygon points="290,164 275,170 290,176" fill="#00BCF2" filter="url(#glow)" opacity="0.7"/>
  <text x="400" y="195" text-anchor="middle" fill="#5ba3d9" font-family="Segoe UI,sans-serif" font-size="11">🖱️ Mouse  ⌨️ Keyboard  📋 Clipboard</text>
  
  <!-- Bottom label -->
  <text x="400" y="265" text-anchor="middle" fill="#556677" font-family="Segoe UI,sans-serif" font-size="13" font-style="italic">Move mouse to screen edge → cursor seamlessly jumps across</text>
</svg>
