version: 2

builds:
  - id: mwb-linux
    main: ./cmd/mwb
    binary: mwb
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64

  - id: mwb-darwin
    main: ./cmd/mwb
    binary: mwb
    env:
      - CGO_ENABLED=1
    goos:
      - darwin
    goarch:
      - arm64

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

nfpms:
  - id: mwb
    package_name: mwb
    file_name_template: "{{ .ConventionalFileName }}"
    ids:
      - mwb-linux
    vendor: Brian Ketelsen
    homepage: https://github.com/bketelsen/mwb
    maintainer: Brian Ketelsen <mail@bjk.dev>
    description: Mouse Without Borders Linux client
    license: MIT
    formats:
      - deb
      - rpm
    bindir: /usr/bin
    contents:
      - src: packaging/mwb.service
        dst: /usr/lib/systemd/user/mwb.service
        type: config
      - src: packaging/99-mwb.rules
        dst: /usr/lib/udev/rules.d/99-mwb.rules
        type: config
    scripts:
      postinstall: packaging/scripts/postinstall.sh
      preremove: packaging/scripts/preremove.sh

homebrew_casks:
  - name: mwb
    ids:
      - mwb-linux
      - mwb-darwin
    repository:
      owner: bketelsen
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Casks
    homepage: "https://github.com/bketelsen/mwb"
    description: "Mouse Without Borders Linux and macOS client for PowerToys KVM sharing"
    license: "MIT"
    caveats: |
      mwb requires system-level permissions to control mouse and keyboard input.

      On macOS:
        Grant Accessibility permission in System Settings > Privacy & Security > Accessibility.
        Add and enable mwb (or Terminal.app when running from terminal).

      On Linux:
        The uinput kernel module must be loaded and your user must be in the input group:
          sudo modprobe uinput
          echo 'KERNEL=="uinput", GROUP="input", MODE="0660"' | sudo tee /etc/udev/rules.d/99-mwb.rules
          sudo udevadm control --reload-rules && sudo udevadm trigger
          sudo usermod -aG input $USER
        Log out and back in for the group change to take effect.
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/mwb"]
          end

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
